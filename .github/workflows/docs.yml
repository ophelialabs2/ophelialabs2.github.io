name: Documentation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.8'
      
      - uses: julia-actions/julia-buildpkg@v1
      
      - run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
          '
      
      - run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check if docs were built
        run: ls -la docs/build/ || echo "No build directory found"
      
      - name: Copy built docs to root
        run: |
          if [ -d "docs/build" ]; then
            rm -rf assets manual search.html search_index.js examples.html index.html 2>/dev/null || true
            cp -r docs/build/* .
            echo "Documentation copied successfully"
          else
            echo "ERROR: docs/build directory not found!"
            exit 1
          fi
      
      - name: Commit and push doc changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIT_USER_NAME: github-actions[bot]
          GIT_USER_EMAIL: github-actions[bot]@users.noreply.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "${{ env.GIT_USER_EMAIL }}"
          git config --local user.name "${{ env.GIT_USER_NAME }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Build and deploy documentation [ci skip]"
            git push --quiet "https://${{ github.actor }}:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" main
          else
            echo "No changes to commit"
          fi
